name: iOS CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve Swift Packages
        run: xcodebuild -resolvePackageDependencies -project BistScreener.xcodeproj -scheme BistScreener

      - name: Build (iOS Simulator)
        run: xcodebuild \
          -project BistScreener.xcodeproj \
          -scheme BistScreener \
          -configuration Debug \
          -destination 'platform=iOS Simulator,name=iPhone 16' \
          build

